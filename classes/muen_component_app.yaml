inherit: [muen_component, muen_component_cspecs]

depends:
  - muen::component-libmubase-ld
buildVars: [ARCH]
buildTools: [mucheckstack]
buildSetup: |
  __SRC=$1

  # $1 - SRC relative component directory
  # $2 - Component spec XML to use (optional)
  muenBuildApp() {
    muenCspecs $1 ${2:-}
    GPRBUILD_EXTRA_ARGS="
      -Xlinker_script=${BOB_DEP_PATHS[muen::component-libmubase-ld]}/component.ld \
      -Xstacksize=8192" \

    # check for arch-specific project file
    PRJ="${1##*/}"
    if [ -f "${__SRC}/${1}/${PRJ}_${ARCH}.gpr" ]; then
      PRJ=${PRJ}_${ARCH}
    fi
    muenBuild ${__SRC}/${1}/${PRJ}

    # stackcheck
    export OBJ_DIR=$(pwd)/build/obj/
    mucheckstack -P${__SRC}/${1}/${PRJ} -l8192
  }

packageTools: [mucbinsplit]
packageSetup: |
  __SRC=$1
  # $1 - Component name
  # $2 - Component spec XML to use (optional)
  muenInstallApp() {
    spec=${2:-${__SRC}/generated/$1.xml}
    mucbinsplit -i ${spec} \
                -b ${__SRC}/install/usr/bin/$1 \
                -o $1.xml .
    mkdir -p .bob
    echo "$1.xml" > .bob/cspecs
  }
