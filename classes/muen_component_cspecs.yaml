depends:
  - ${MUEN_POLICY_SRC}

buildTools: [mucfgcvresalloc, muxmlfilter, mucgenspec, libxslt-tools]
buildVars: [MUEN_POLICY_SRC]
buildSetup: |
  mkdir -p generated
  export GENERATED=$(pwd)/generated
  export __SRC=$1

  # $1 - SRC relative component directory
  muenCspecs() {
    PRJ="${1##*/}"
    SPEC_DIR="${__SRC}/$1/spec"
    SPEC_XML="${SPEC_DIR}/${PRJ}.xml"
    SPEC_XSL="${SPEC_DIR}/${PRJ}.xsl"

    if [ -e ${SPEC_XSL} ]; then
      xsltproc -o generated/${PRJ}.xml \
         $SPEC_XSL \
         ${BOB_DEP_PATHS[${MUEN_POLICY_SRC}]}/policy_src.xml

      SPEC_XML=generated/${PRJ}.xml
    fi

    if [ -e ${SPEC_XML} ]; then
      # cspecs
      mucfgcvresalloc ${SPEC_XML} \
        generated/${PRJ}.xml -I generated

      # Filter xml cspecs
      muxmlfilter -isn Component_Ext -osn Component \
        generated/${PRJ}.xml generated/${PRJ}_filtered.xml

      # Generate cspecs
      mucgenspec -i generated/${PRJ}_filtered.xml generated
    fi
  }
