inherit: [gpr]

depends:
  - adacore::aunit-dev

buildVarsWeak: [MAKE_JOBS]
buildTools: [libadalang-tools]
buildVars: [TOOLCHAIN_SYSROOT]
buildSetup: |
  export OBJ_DIR=$(pwd)/obj
  export GNATTEST_HARNESS_DIR=$(pwd)/build/test
  export GNATTEST_TESTS_BUILD_DIR=$(pwd)/tests
  export GNATTEST_STUBS_DIR=$(pwd)/stubs
buildScript: |
  muenTest () {
    mkdir -p tests
    if [[ ${GNATTEST_TESTS_DIR:-UNSET} != UNSET ]]; then
      rsync -a --delete ${GNATTEST_TESTS_DIR}/ tests
    fi

    export GCONV_PATH=${BOB_TOOL_PATHS['target-toolchain']}/${TOOLCHAIN_SYSROOT}/usr/lib/gconv
    gnattest -q --test-duration --omit-sloc --no-subprojects \
        -P$1

    gprbuild -P $(pwd)/build/test/test_driver \
      -j${MAKE_JOBS:-$(nproc)} \
      -gnatef -s -k \
      --target=${GPR_TARGET} \
      -p \
      ${@:2} \
      -largs "${LARGS[@]}" -lgcov \
      -cargs "${CARGS[@]}"

    pushd build/test
    if [[ ${GNATTEST_DATA_DIR:-UNSET} != UNSET ]]; then
      cp ${GNATTEST_DATA_DIR} . -r
    fi
    mkdir -p obj
    ./test_runner --exit-status=on --passed-tests=show
    popd
  }
packageScript: |
  __SRC_DIR=$1
  muenPackageTest () {
    cp $__SRC_DIR/build/test/gnattest.xml .
    cp $__SRC_DIR/obj/*.gcda .
    cp $__SRC_DIR/obj/*.gcno .
  }
