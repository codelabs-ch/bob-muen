environment:
  BINUTILS_TARGETS_BFD: "all"
  BINUTILS_ENABLE_64BIT_BFD: "1"
  GRUB2_BOOTSTRAP: "1"
  GRUB2_TARGET: "i386"
  GRUB2_PLATFORM: "pc"
  GNULIB_URL: https://github.com/coreutils/gnulib.git
  GNU_MIRROR: https://mirror.init7.net/gnu/

scmOverrides:
  - match:
      url: ${GNU_MIRROR}/grub/grub-2.14.tar.gz
    del: [digestSHA256, stripComponents]
    set:
      scm: git
      url: https://github.com/codelabs-ch/grub2.git
      branch: bsbsc-2.15
      commit: 7cbb352612ab31d96671cf8879bb5505aec9c7ae

include:
  - user

archivePrepend:
  backend: http
  name: "bob archive"
  url: "https://bob-archive.codelabs.ch"
  sslVerify: true
  flags: [download]
