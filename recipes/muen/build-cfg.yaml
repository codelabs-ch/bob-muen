inherit: [gpr]

checkoutSCM:
  scm: git
  url: https://git.codelabs.ch/muen/build-cfg.git
  branch: main
  commit: 308a39b7107f2c54593e1599d29acc26d19687c6

buildScript: |
  rsync -a --delete $1/ .

multiPackage:
  gpr:
    buildVars: [ARCH]
    packageScript: |
      gprInstallPackageDev $1/gpr "*"
  scripts:
    packageScript: |
      rsync -a --delete $1/scripts/ .
