inherit: [gpr]

checkoutSCM:
  scm: git
  url: https://git.codelabs.ch/muen/build-cfg.git
  branch: extend_als
  commit: 5c32b062a4ba315a7a5cb9e821946aabd67afd3d

buildScript: |
  rsync -a --delete $1/ .

multiPackage:
  gpr:
    buildVars: [ARCH]
    packageScript: |
      gprInstallPackageDev $1/gpr "*"
  scripts:
    packageScript: |
      rsync -a --delete $1/scripts/ .
