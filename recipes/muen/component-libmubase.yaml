inherit: [muen_component]

checkoutSCM:
  scm: git
  url: https://git.codelabs.ch/muen/component/base.git
  branch: arm64-systems-cleanup
  commit: ad554830dbff84cf4e4956c371a3f37e0b618bde

multiPackage:
  ld:
    buildScript: |
      cp $1/component.*.ld .
    packageScript: |
      cp $1/component.*.ld .
  "":
    depends:
      - muen::common-common-dev
    buildVars: [ARCH, MUEN_BUILD_MODE]
    buildScript: |
      muenBuild $1/libmubase.gpr
    multiPackage:
      dev:
        provideDeps: ['*-dev']
        packageScript: gprInstallPackageDev
      tgt:
        provideDeps: ['*-tgt']
        packageScript: gprInstallPackageTgt
