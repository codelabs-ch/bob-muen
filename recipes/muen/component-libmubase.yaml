inherit: [muen_component]

checkoutSCM:
  scm: git
  url: https://git.codelabs.ch/muen/component/base.git
  branch: use-one-linkerscript
  commit: a7ec0b234cfe601434e2c37429f49e9fd0d322b9

multiPackage:
  ld:
    buildScript: |
      cp $1/component.ld .
    packageScript: |
      cp $1/component.ld .
  "":
    depends:
      - muen::common-common-dev
    buildVars: [ARCH, MUEN_BUILD_MODE]
    buildScript: |
      muenBuild $1/libmubase.gpr
    multiPackage:
      dev:
        provideDeps: ['*-dev']
        packageScript: gprInstallPackageDev
      tgt:
        provideDeps: ['*-tgt']
        packageScript: gprInstallPackageTgt
